name: CI
on: [push, pull_request]
jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cfg:
          - conda-env: base
            python-version: "3.11"
          - conda-env: base
            python-version: "3.12"
          - conda-env: base
            python-version: "3.13"
            pytest-version: "9.0.1"
    env:
      PYVER: ${{ matrix.cfg.python-version }}
      CONDA_ENV: ${{ matrix.cfg.conda-env }}
    steps:
    - uses: actions/checkout@v5
    
    - name: Create Environment
      uses: conda-incubator/setup-miniconda@v2
      with:
        installer-url: https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
        activate-environment: test
        environment-file: devtools/conda-envs/${{ matrix.cfg.conda-env }}.yaml
        python-version: ${{ matrix.cfg.python-version }}
        auto-activate-base: false

    - name: Install test dependencies
      shell: bash -l {0}
      run: |
        conda install -y pytest pytest-cov
        conda install -y pip
    - name: Install MolSym
      shell: bash -l {0}
      run: | 
        pip install pint
        pip install git+https://github.com/NASymmetry/MolSym.git
    - name: Install ConcordantModes
      shell: bash -l {0}
      run: | 
        python -m pip install .
    - name: Make ref_data available from repo root
      shell: bash -l {0}
      run: |
        ln -sfn "${GITHUB_WORKSPACE}/concordantmodes/tests/ref_data" ref_data
        echo "Symlink created:"
        ls -l ref_data
    - name: Test with pytest
      shell: bash -l {0}
      run: |
        export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
        pytest --cov="concordantmodes" --color=yes --cov-report=xml concordantmodes/tests
